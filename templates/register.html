{% extends 'base.html' %}
{% block title %}Register — DrowzyAI{% endblock %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-box animate-in" style="max-width:470px;">
    <div class="auth-logo">
      <span class="auth-logo-icon">◉ DrowzyAI</span>
      <span class="auth-logo-sub">Create Your Account</span>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="reg_name" class="form-control" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="reg_email" class="form-control" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="reg_password" class="form-control" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select id="reg_role" class="form-control">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Face Photo <span style="color:var(--dim);font-weight:400">(for recognition)</span></label>
      <label class="file-input-label">
        <span>📷</span>
        <span id="face_file_name">Choose a clear face photo...</span>
        <input type="file" id="reg_face" accept="image/*" onchange="updateFileName(this)">
      </label>
      <div id="face_preview_wrap" style="display:none;margin-top:10px;">
        <img id="face_preview" style="width:80px;height:80px;object-fit:cover;border-radius:50%
